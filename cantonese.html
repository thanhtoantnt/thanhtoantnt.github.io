  let h='<p style="color:var(--text2);margin-bottom:12px">Click a card to see the English meaning</p><div class="vocab-grid">';
  L.vocab.forEach(v=>{
    h+='<div class="vocab-card" onclick="this.classList.toggle(\'flipped\')"><div class="front"><div class="word">'+v.c+' <button class="speak-btn" data-speak="'+v.c.replace(/"/g,'&quot;')+'" onclick="event.stopPropagation();speak(this.dataset.speak)" title="Listen">🔊</button></div><div class="jp">'+v.j+'</div>'+masteryDots(v.c)+'<div class="tag">click to flip</div></div><div class="back"><div class="word" style="color:var(--yellow)">'+v.e+'</div><div class="jp">'+v.c+'</div><div class="meaning">'+v.j+'</div></div></div>';
  });
  return h+'</div>';
}

function initFcSession(){
  const L=LESSONS[currentLesson];
  fcMode='due';fcFlipped=false;fcSessionDone=false;
  fcSessionCorrect=0;fcSessionWrong=0;fcMistakes=[];
  fcQueue=[];
  L.vocab.forEach((v,i)=>{if(isDue(v.c))fcQueue.push(i)});
  fcQueue=shuffle(fcQueue);
  fcQueuePos=0;
}

function startFcSession(mode){
  const L=LESSONS[currentLesson];
  fcMode=mode;fcFlipped=false;fcSessionDone=false;
  fcSessionCorrect=0;fcSessionWrong=0;fcMistakes=[];
  if(mode==='due'){
    fcQueue=[];
    L.vocab.forEach((v,i)=>{if(isDue(v.c))fcQueue.push(i)});
  }else{
    fcQueue=[...Array(L.vocab.length).keys()];
  }
  fcQueue=shuffle(fcQueue);
  fcQueuePos=0;
  document.getElementById('sec-flashcards').innerHTML=renderFlashcards(L);
}

function startFcMistakes(){
  if(fcMistakes.length===0)return;
  const L=LESSONS[currentLesson];
  fcQueue=shuffle(fcMistakes);
  fcMistakes=[];
  fcQueuePos=0;fcFlipped=false;fcSessionDone=false;
  fcSessionCorrect=0;fcSessionWrong=0;
  document.getElementById('sec-flashcards').innerHTML=renderFlashcards(L);
}

function renderFlashcards(L){
  const dueCount=L.vocab.filter(v=>isDue(v.c)).length;
  const totalCount=L.vocab.length;

  let h='<div class="fc-mode-row">'+
    '<button class="toggle-btn'+(fcMode==='due'?' on':'')+'" onclick="startFcSession(\'due\')">📋 Due ('+dueCount+')</button>'+
    '<button class="toggle-btn'+(fcMode==='all'?' on':'')+'" onclick="startFcSession(\'all\')">📚 All ('+totalCount+')</button>'+
    '</div>';

  if(fcQueue.length===0&&fcMode==='due'){
    h+='<div class="session-summary"><h3>All caught up!</h3><p style="color:var(--text2);margin:12px 0">No cards due for review right now. Great work!</p><div class="fc-controls" style="justify-content:center"><button class="fc-btn got-it" onclick="startFcSession(\'all\')">Review All</button></div></div>';
    return h;
  }

  if(fcSessionDone){
    const pct=fcQueue.length>0?Math.round(fcSessionCorrect/fcQueue.length*100):0;
    h+='<div class="session-summary"><h3>Session Complete!</h3><div class="session-stats">'+
      '<div class="stat"><div class="num" style="color:var(--green)">'+fcSessionCorrect+'</div><div class="label">Correct</div></div>'+
      '<div class="stat"><div class="num" style="color:var(--red)">'+fcSessionWrong+'</div><div class="label">Need Practice</div></div>'+
      '<div class="stat"><div class="num" style="color:var(--accent)">'+pct+'%</div><div class="label">Accuracy</div></div>'+
      '</div><div class="fc-controls" style="justify-content:center;gap:10px">';
    if(fcSessionWrong>0)h+='<button class="fc-btn skip" onclick="startFcMistakes()">Review Mistakes ('+fcSessionWrong+')</button>';
    h+='<button class="fc-btn got-it" onclick="startFcSession(\''+fcMode+'\')">Start Over</button></div></div>';
    return h;
  }

  const vi=fcQueue[fcQueuePos];
  const v=L.vocab[vi];
  const w=progress.words[v.c];
  const box=w?w.box:0;

  h+='<div class="flashcard-area"><div class="fc-counter">'+(fcQueuePos+1)+' / '+fcQueue.length+'</div>'+
    masteryDots(v.c)+
    '<div class="flashcard'+(fcFlipped?' flipped':'')+'" onclick="fcFlip(this)"><div class="flashcard-inner">'+
    '<div class="flashcard-face flashcard-front"><div class="big">'+v.c+'</div><div class="hint">Click to reveal</div></div>'+
    '<div class="flashcard-face flashcard-back"><div class="big">'+v.j+'</div><div class="sub">'+v.e+'</div></div>'+
    '</div></div>'+
    '<div class="fc-controls">'+
    '<button class="fc-btn skip" onclick="fcAnswer(false)"'+(fcFlipped?'':' disabled')+'>Don\'t Know</button>'+
    '<button class="fc-btn got-it" onclick="fcAnswer(true)"'+(fcFlipped?'':' disabled')+'>Got It</button>'+
    '</div><div class="kb-hint">Space: flip &middot; &larr; Don\'t Know &middot; &rarr; Got It</div></div>';
  return h;
}

function fcFlip(el){fcFlipped=!fcFlipped;el.classList.toggle('flipped',fcFlipped)}

function fcAnswer(correct){
  if(!fcFlipped||fcSessionDone)return;
  const L=LESSONS[currentLesson];
  const vi=fcQueue[fcQueuePos];
  const v=L.vocab[vi];
  markWord(v.c,correct);
  if(correct)fcSessionCorrect++;else{fcSessionWrong++;fcMistakes.push(vi)}
  fcQueuePos++;fcFlipped=false;
  if(fcQueuePos>=fcQueue.length)fcSessionDone=true;
  document.getElementById('sec-flashcards').innerHTML=renderFlashcards(L);
}

function renderGrammar(L){
  return L.grammar.map(g=>'<div class="grammar-card"><div class="pattern">'+g.pattern+'</div><div class="explanation">'+g.desc+'</div><div class="example">'+g.ex+'<br><span style="color:var(--yellow);font-size:.9em">'+g.en+'</span></div></div>').join('');
}

function generateAutoQuiz(L,mode){
  const picked=shuffle([...Array(L.vocab.length).keys()]).slice(0,10);
  return picked.map(vi=>{
    const v=L.vocab[vi];
    const others=shuffle(L.vocab.filter((_,j)=>j!==vi)).slice(0,3);
    let opts,q;
    if(mode==='reverse'){
      q='Which Cantonese word means "'+v.e+'"?';
      opts=[v.c,...others.map(d=>d.c)];
    }else if(mode==='typejp'){
      q=v.c;
      opts=[v.j];
    }else{
      q='What is the Jyutping for "'+v.c+'"?';
      opts=[v.j,...others.map(d=>d.j)];
    }
    const correctOpt=opts[0];
    const shuffled=shuffle(opts);
    return{q,opts:shuffled,ans:shuffled.indexOf(correctOpt),wordKey:v.c};
  });
}

function setQuizMode(mode){
  quizMode=mode;quizAnswered=0;quizCorrect=0;
  const L=LESSONS[currentLesson];
  quizQuestions=mode==='meaning'?L.quiz.map(q=>({...q})):generateAutoQuiz(L,mode);
  document.getElementById('sec-quiz').innerHTML=renderQuiz(L);
}

function renderQuiz(L){
  let h='<div class="quiz-modes">'+
    '<button class="qmode-btn'+(quizMode==='meaning'?' active':'')+'" onclick="setQuizMode(\'meaning\')">Cantonese → English</button>'+
    '<button class="qmode-btn'+(quizMode==='reverse'?' active':'')+'" onclick="setQuizMode(\'reverse\')">English → Cantonese</button>'+
    '<button class="qmode-btn'+(quizMode==='jyutping'?' active':'')+'" onclick="setQuizMode(\'jyutping\')">Jyutping Match</button>'+
    '</div>';

  if(quizQuestions.length===0)return h+'<p style="color:var(--text2)">Select a quiz mode above.</p>';

  h+='<div class="score-bar"><span class="score">'+quizCorrect+'</span><span class="total">/ '+quizQuestions.length+'</span><div class="progress"><div class="progress-fill" style="width:'+quizAnswered/quizQuestions.length*100+'%"></div></div>';
  if(quizAnswered>=quizQuestions.length&&quizMode!=='meaning')h+='<button class="action-btn" onclick="setQuizMode(\''+quizMode+'\')" style="margin-left:auto;font-size:.8em">New Set</button>';
  h+='</div><div class="quiz-container">';

  quizQuestions.forEach((q,qi)=>{
    const answered=qi<quizAnswered;
    if(quizMode==='typejp'){
      h+='<div class="quiz-q"><div class="q-text">'+(qi+1)+'. Type the Jyutping for: <b>'+q.q+'</b></div><input class="quiz-input" id="qj-'+qi+'" placeholder="e.g. '+q.opts[0]+'" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:1em" onkeydown="if(event.keyCode==13)answerQuiz(this.dataset.qi,-1)" data-qi="'+qi+'"></div>';
      return;
    }
    h+='<div class="quiz-q"><div class="q-text">'+(qi+1)+'. '+q.q+'</div><div class="quiz-options">';
    q.opts.forEach((o,oi)=>{
      let cls='quiz-opt';
      if(answered){cls+=' disabled';if(oi===q.ans)cls+=' correct'}
      h+='<div class="'+cls+'" onclick="answerQuiz('+qi+','+oi+')">'+o+'</div>';
    });
    h+='</div></div>';
  });
  return h+'</div>';
}

function answerQuiz(qi,oi){
  if(qi<quizAnswered)return;
  const q=quizQuestions[qi];
  let correct;
  if(quizMode==='typejp'){
    const input=document.getElementById('qj-'+qi);
    if(!input)return;
    const val=input.value.trim().toLowerCase().replace(/\s+/g,'');
    correct=val===q.opts[0].toLowerCase().replace(/\s+/g,'');
    input.style.borderColor=correct?'var(--green)':'var(--red)';
    input.disabled=true;
  }else{
    correct=oi===q.ans;
  }
  if(correct)quizCorrect++;
  quizAnswered++;
  if(q.wordKey)markWord(q.wordKey,correct);
  const L=LESSONS[currentLesson];
  const sec=document.getElementById('sec-quiz');
  const opts=sec.querySelectorAll('.quiz-q:nth-child('+(qi+1)+') .quiz-opt');
  opts.forEach((o,i)=>{o.classList.add('disabled');if(i===q.ans)o.classList.add('correct');if(i===oi&&!correct)o.classList.add('wrong')});
  const bar=sec.querySelector('.progress-fill');
  if(bar)bar.style.width=quizAnswered/quizQuestions.length*100+'%';
  const score=sec.querySelector('.score');
  if(score)score.textContent=quizCorrect;
}

function renderProgress(L){
  const st=getLessonStats(L);
  const allTotal=LESSONS.reduce((s,l)=>s+l.vocab.length,0);
  const allMastered=LESSONS.reduce((s,l)=>s+getLessonStats(l).mastered,0);
  const allWords={};
  LESSONS.forEach(l=>l.vocab.forEach(v=>{const w=progress.words[v.c];if(w)allWords[v.c]=w}));
  const allUnique=Object.keys(allWords).length;

  let h='<h2>📊 Progress — '+L.title+'</h2>';

  h+='<div class="stats-grid">'+
    '<div class="stat-card accent"><div class="num">'+st.total+'</div><div class="label">Total Words</div></div>'+
    '<div class="stat-card green"><div class="num">'+st.mastered+'</div><div class="label">Mastered (Box 4-5)</div></div>'+
    '<div class="stat-card yellow"><div class="num">'+st.learning+'</div><div class="label">Learning (Box 1-3)</div></div>'+
    '<div class="stat-card blue"><div class="num">'+st.new+'</div><div class="label">Not Seen Yet</div></div>'+
    '</div>';

  const sk=progress.streak;
  h+='<div class="streak-display"><span class="fire">🔥</span><span class="count">'+sk.count+'</span><span class="label">day streak</span></div>';

  h+='<div class="mastery-chart"><h3>Mastery Distribution</h3>';
  const maxBox=Math.max(...st.boxes,1);
  for(let i=0;i<5;i++){
    const pct=Math.round(st.boxes[i]/maxBox*100);
    h+='<div class="chart-row"><div class="box-label">'+BOX_LABELS[i]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+BOX_COLORS[i]+'"></div></div><div class="count">'+st.boxes[i]+'</div></div>';
  }
  h+='</div>';

  h+='<p style="color:var(--text2);margin-bottom:20px;font-size:.9em">Across all lessons: '+allMastered+' mastered out of '+allTotal+' total words ('+allUnique+' unique words studied).</p>';

  h+='<div class="action-row">'+
    '<button class="action-btn" onclick="exportProgress()">📥 Export Progress</button>'+
    '<button class="action-btn" onclick="document.getElementById(\'importFile\').click()">📤 Import Progress</button>'+
    '<button class="action-btn danger" onclick="resetProgress()">🗑 Reset All Progress</button>'+
    '<input type="file" id="importFile" class="hidden-input" accept=".json" onchange="importProgress(this)">'+
    '</div>';

  return h;
}

function exportProgress(){
  const blob=new Blob([JSON.stringify(progress,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='cantonese-progress-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importProgress(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(d.version===1&&d.words){
        progress=d;saveProgress();
        initFcSession();
        quizQuestions=LESSONS[currentLesson].quiz.map(q=>({...q}));
        quizAnswered=0;quizCorrect=0;
        render();
      }else{alert('Invalid file format')}
    }catch(err){alert('Invalid file format')}
  };
  reader.readAsText(file);
}

function resetProgress(){
  if(!confirm('Reset all learning progress? This cannot be undone.'))return;
  progress={version:1,streak:{lastDate:'',count:0},words:{}};
  saveProgress();
  initFcSession();
  quizQuestions=LESSONS[currentLesson].quiz.map(q=>({...q}));
  quizAnswered=0;quizCorrect=0;
  render();
}

document.addEventListener('keydown',function(e){
  const fc=document.getElementById('sec-flashcards');
  if(!fc||!fc.classList.contains('active'))return;
  if((e.key===' '||e.key==='Enter')&&!fcSessionDone&&fcQueue.length>0){
    e.preventDefault();
    const card=fc.querySelector('.flashcard');
    if(card)fcFlip(card);
  }else if(e.key==='ArrowRight'&&fcFlipped&&!fcSessionDone){
    e.preventDefault();fcAnswer(true);
  }else if(e.key==='ArrowLeft'&&fcFlipped&&!fcSessionDone){
    e.preventDefault();fcAnswer(false);
  }
});

init();
</script>
</body>
</html>
